services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: rutracker_parser
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\""]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/rutracker_parser
      MONGO_DB_NAME: rutracker_parser
      MONGO_RETRY_DELAY_MS: 5000
      RUTRACKER_BASE_URL: https://rutracker.org/forum/
      RUTRACKER_INDEX_PATH: index.php
      RUTRACKER_BB_SESSION: ${RUTRACKER_BB_SESSION}
      REQUEST_TIMEOUT_MS: 20000
      SCRAPE_ON_STARTUP: "true"
      SCRAPE_STARTUP_DELAY_MS: 3000
      TOPIC_MAX_TOPICS_PER_RUN: 150
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - api
    environment:
      PORT: 8080
      API_TARGET: http://api:3000
    ports:
      - "8080:8080"

volumes:
  mongo_data:
